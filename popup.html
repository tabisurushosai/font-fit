<!doctype html><html><head><meta charset="utf-8"><title>Font Fit</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f6f0e7;
    --surface: #fffdfa;
    --surface-soft: #fbf7f0;
    --surface-muted: #f0eadf;
    --border: #c8bdac;
    --text: #1f2933;
    --muted: #374151;
    --primary: #285548;
    --primary-strong: #1f4238;
    --danger-bg: #fde9e9;
    --danger-text: #8f1d1d;
    --info-bg: #e8f2ff;
    --info-text: #174a7c;
    --success-bg: #e8f6ee;
    --success-text: #1f5b3a;
    --focus: #5b21b6;
  }

  * { box-sizing: border-box; }

  body {
    width: 360px;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  .popup-shell {
    padding: 18px;
  }

  #app-title {
    margin: 0 0 14px;
    color: var(--text);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .popup-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--surface);
    box-shadow: 0 12px 28px rgb(31 41 51 / 10%);
  }

  .banner,
  .section,
  .status-message,
  .onboarding-tip,
  .empty-state,
  .section-title {
    border-radius: 10px;
  }

  .banner {
    padding: 11px 12px;
    border: 1px solid transparent;
    font-size: 12.5px;
    font-weight: 600;
    line-height: 1.5;
  }

  .banner--danger { border-color: #f3c1c1; background: var(--danger-bg); color: var(--danger-text); }
  .banner--info { border-color: #bfdcff; background: var(--info-bg); color: var(--info-text); }
  .banner--success { border-color: #bde4ca; background: var(--success-bg); color: var(--success-text); }
  .banner a {
    display: inline-flex;
    align-items: center;
    min-height: 44px;
    margin-top: 4px;
    color: currentColor;
    font-weight: 700;
    text-decoration-thickness: 0.12em;
    text-underline-offset: 0.18em;
  }

  .section {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 13px;
    border: 1px solid var(--border);
    background: var(--surface-soft);
  }

  .form-row,
  .inline-row,
  .button-row,
  .slider-row,
  .preset-list,
  .auto-apply-row {
    display: flex;
    gap: 8px;
  }

  .form-row > div { flex: 1; }
  .setting-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px;
    border: 1px solid #ddd4c6;
    border-radius: 12px;
    background: var(--surface);
  }
  .slider-row {
    align-items: center;
    gap: 10px;
  }
  .button-row button { flex: 1; }
  .preset-list { flex-wrap: wrap; margin: 0; }
  .preset-list .empty-state { width: 100%; }
  .auto-apply-row {
    align-items: center;
    min-height: 44px;
    padding: 0 2px;
    color: var(--muted);
    font-size: 12px;
  }

  .auto-apply-row input {
    width: 24px;
    height: 24px;
    margin: 0;
    flex: 0 0 auto;
  }

  label,
  .section-title {
    display: block;
    margin-bottom: 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .section-title {
    margin: 0;
    color: var(--text);
    font-size: 13px;
  }

  .checkbox-label {
    width: 100%;
    min-height: 44px;
    margin-bottom: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  select,
  button,
  input[type="range"] {
    font: inherit;
  }

  select {
    width: 100%;
    min-height: 44px;
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    color: var(--text);
  }

  button {
    min-height: 44px;
    padding: 9px 13px;
    border: 1px solid var(--primary);
    border-radius: 10px;
    background: var(--primary);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }

  button.secondary {
    background: #fff;
    color: var(--primary);
  }

  button:not(:disabled):not([aria-disabled="true"]):hover {
    border-color: var(--primary-strong);
    background: var(--primary-strong);
  }

  button.secondary:not(:disabled):not([aria-disabled="true"]):hover {
    background: #f1f6f3;
    color: var(--primary-strong);
  }

  button.compact {
    min-height: 44px;
    padding: 8px 10px;
    font-size: 12px;
  }

  button:disabled,
  button[aria-disabled="true"] {
    border-color: var(--border);
    background: var(--surface-muted);
    color: var(--muted);
    cursor: not-allowed;
  }

  select:focus-visible,
  a:focus-visible,
  button:focus-visible,
  input:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 2px;
  }

  input[type="range"] {
    flex: 1;
    min-height: 44px;
    accent-color: var(--primary);
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
    border: 0;
  }

  .value-pill {
    min-width: 52px;
    padding: 5px 8px;
    border-radius: 999px;
    background: var(--surface-muted);
    color: var(--text);
    font-size: 12px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .status-message {
    margin: 0;
    padding: 9px 11px;
    border: 1px solid #bde4ca;
    background: var(--success-bg);
    color: var(--success-text);
    font-size: 12px;
    font-weight: 700;
  }

  .onboarding-tip {
    margin: 0;
    padding: 11px 12px;
    border: 1px solid #bfdcff;
    background: var(--info-bg);
    color: var(--info-text);
    font-size: 12px;
    font-weight: 700;
  }

  .empty-state,
  .app-loading {
    margin: 0;
    padding: 13px;
    border: 1px dashed var(--border);
    background: var(--surface-muted);
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .empty-state__title {
    color: var(--text);
    font-size: 12.5px;
  }

  .empty-state__action {
    color: var(--primary);
    font-weight: 700;
  }

  .app-loading {
    border-style: solid;
    border-radius: 12px;
    font-weight: 700;
    text-align: center;
  }
</style></head>
<body>
<main class="popup-shell" aria-labelledby="app-title">
<h1 id="app-title"></h1>
<div id="app" class="app-loading" role="status"></div>
</main>
<script type="module" src="dist/popup.js"></script>
</body></html>
