<!doctype html><html><head><meta charset="utf-8"><title>Font Fit</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f7f4ee;
    --surface: #fffdfa;
    --surface-muted: #f2eee7;
    --border: #d9d2c6;
    --text: #1f2933;
    --muted: #5f6c7b;
    --primary: #2f5d50;
    --primary-strong: #24483e;
    --danger-bg: #fdecec;
    --danger-text: #9f1d1d;
    --info-bg: #eaf3ff;
    --info-text: #1d4f8f;
    --success-bg: #eaf7ef;
    --success-text: #23603d;
  }

  * { box-sizing: border-box; }

  body {
    width: 336px;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  .popup-shell {
    padding: 14px;
  }

  #app-title {
    margin: 0 0 10px;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .popup-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    box-shadow: 0 8px 20px rgb(31 41 51 / 8%);
  }

  .banner,
  .section,
  .status-message,
  .empty-state {
    border-radius: 10px;
  }

  .banner {
    padding: 9px 10px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.45;
  }

  .banner--danger { background: var(--danger-bg); color: var(--danger-text); }
  .banner--info { background: var(--info-bg); color: var(--info-text); }
  .banner--success { background: var(--success-bg); color: var(--success-text); }
  .banner a { color: currentColor; font-weight: 700; }

  .section {
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .form-row,
  .inline-row,
  .button-row,
  .slider-row,
  .preset-list,
  .auto-apply-row {
    display: flex;
    gap: 8px;
  }

  .form-row > div { flex: 1; }
  .slider-row { align-items: center; }
  .button-row button { flex: 1; }
  .preset-list { flex-wrap: wrap; margin: 6px 0 8px; }
  .preset-list .empty-state { width: 100%; }
  .auto-apply-row { align-items: flex-start; color: var(--muted); font-size: 12px; }
  .auto-apply-row input { margin-top: 2px; }

  label {
    display: block;
    margin-bottom: 5px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  select,
  button,
  input[type="range"] {
    font: inherit;
  }

  select {
    width: 100%;
    min-height: 36px;
    padding: 6px 9px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
  }

  button {
    min-height: 34px;
    padding: 7px 10px;
    border: 1px solid var(--primary);
    border-radius: 9px;
    background: var(--primary);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }

  button.secondary {
    background: #fff;
    color: var(--primary);
  }

  button.compact {
    min-height: 28px;
    padding: 4px 8px;
    font-size: 12px;
  }

  button:disabled {
    border-color: var(--border);
    background: var(--surface-muted);
    color: var(--muted);
    cursor: not-allowed;
  }

  select:focus-visible,
  button:focus-visible,
  input:focus-visible {
    outline: 3px solid rgb(47 93 80 / 28%);
    outline-offset: 2px;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--primary);
  }

  .value-pill {
    min-width: 42px;
    padding: 2px 6px;
    border-radius: 999px;
    background: var(--surface-muted);
    color: var(--text);
    font-size: 12px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .status-message {
    margin: 0;
    padding: 7px 9px;
    background: var(--success-bg);
    color: var(--success-text);
    font-size: 12px;
    font-weight: 700;
  }

  .empty-state,
  .app-loading {
    margin: 0;
    padding: 10px;
    border: 1px dashed var(--border);
    background: var(--surface-muted);
    color: var(--muted);
    font-size: 12px;
  }
</style></head>
<body>
<main class="popup-shell" aria-labelledby="app-title">
<h1 id="app-title"></h1>
<div id="app" class="app-loading" role="status"></div>
</main>
<script type="module" src="dist/popup.js"></script>
</body></html>
